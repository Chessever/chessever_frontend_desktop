name: chessever
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 14.3.0+149

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  #for localization
  intl: ^0.20.2

  #for network query
  http: ^1.2.1

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  #for widget testing
  # device_preview_plus: ^2.4.2

  #for state management
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^2.6.1

  #for icons library
  font_awesome_flutter: ^10.8.0
  #render svg icons
  flutter_svg: ^2.2.4

  #for custom dropdown button and country picker and flags
  country_flags: ^4.1.2
  flutter_country_flags: ^0.0.1  # For England, Scotland, Wales flags
  dropdown_button2: ^2.3.9
  country_picker: ^2.0.25
  country_code: ^1.1.0
  skeletonizer: ^2.1.3

  #cached network image
  cached_network_image: ^3.4.1


  #supabase
  supabase_flutter: ^2.12.0

  #authentication
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  sentry_flutter: ^9.10.0

  #for hashing
  crypto: ^3.0.6

  #for generated bot identity names (decoupled from real chess players)
  faker: ^2.2.0

  # Engine download/install pipeline: zip + tar extraction for Stockfish /
  # lc0 / Maia release archives.
  archive: ^4.0.7

  #secure key storage
  flutter_dotenv: ^5.1.0


  #for settings persistence (minimal - only Supabase auth)
  shared_preferences: ^2.5.4

  #for SQLite local storage (replacing most SharedPreferences usage)
  sqflite: ^2.4.1
  path: ^1.9.0

  #for class origin
  equatable: ^2.0.7

  #for late action for frequent calls
  easy_debounce: ^2.0.3

  #for launching url
  url_launcher: ^6.3.1

  chess: ^0.8.1
  stockfish: ^1.8.1
  onesignal_flutter: ^5.1.2
  firebase_core: ^3.4.0

  permission_handler: ^12.0.0+1

  flutter_native_splash: ^2.4.7
  logger: ^2.6.1
  collection: ^1.19.1

  chessground: ^9.0.0
  dartchess: ^0.12.3
  fast_immutable_collections: ^11.0.4
  flutter_soloud: ^4.0.4

  scrollable_positioned_list: ^0.3.8
  smooth_page_indicator: ^1.2.1
  sprung: ^3.0.1
  clarity_flutter: ^1.1.0
  upgrader: ^12.1.0
  screenshot: ^3.0.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_animate: ^4.5.0
  package_info_plus: ^8.1.3
  dart_mappable: ^4.2.2
  icons_launcher: ^3.1.0
  heroine: ^0.7.2
  motor: ^1.0.0-dev.0
  cue: ^0.2.1
  smooth_sheets: ^0.15.0
  app_links: ^6.4.1
  dio: ^5.9.0
  app_settings: ^7.0.0
  terminate_restart: ^1.1.0
  shorebird_code_push: ^2.0.5
  showcaseview: ^5.0.1
  in_app_review: ^2.0.11
  image: ^4.7.2
  marionette_flutter: ^0.3.0
  appsflyer_sdk: ^6.17.9+1-rc1
  app_tracking_transparency: ^2.0.6+1

  # PGN import: browse device files (both platforms) + handle files opened
  # from Files / file managers / share sheets (iOS CFBundleDocumentTypes,
  # Android ACTION_VIEW intent-filters).
  file_picker: ^8.1.4
  receive_sharing_intent: ^1.8.1

  # ─────────────────────────────────────────────────────────────────────────
  # DESKTOP (macOS + Windows). See CLAUDE.md §6 for the migration matrix.
  # The packages above this block include several mobile-only deps that will
  # be removed as their call-sites migrate to the desktop equivalents below.
  # ─────────────────────────────────────────────────────────────────────────
  forui: ^0.16.0                  # desktop-friendly UI primitives (shell, dialogs, dropdowns)
  window_manager: ^0.5.1          # window bounds, min size, hide-before-first-frame
  screen_retriever: ^0.2.0        # display work-area bounds for safe window sizing
  hotkey_manager: ^0.2.3          # global hotkeys (when Flutter Shortcuts/Actions aren't enough)
  local_notifier: ^0.1.6          # transient desktop notifications (replaces OneSignal on desktop)
  desktop_drop: ^0.6.0            # drag-drop files into the window (replaces receive_sharing_intent)
  sqflite_common_ffi: ^2.3.6      # sqflite on Windows/Linux/macOS via FFI (replaces sqflite on desktop)
  ffi: ^2.1.4
  desktop_updater: 2.0.0-dev.1    # pinned: dev release, no semver-range pulls. archive at chessever.com/updates
  flutter_onnxruntime: 1.6.4
  dart_frog: ^1.2.6
  dart_frog_web_socket: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

  # The "flutter_lints" package below contains a set of recommended lints to
