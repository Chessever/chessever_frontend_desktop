  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  dart_mappable_builder: ^4.2.3
  # riverpod_generator: ^2.6.5
  riverpod_annotation: ^2.6.1
  patrol: ^4.3.0
  patrol_finders: ^3.1.0
  xml: ^6.6.1


dependency_overrides:
  app_links: ^6.4.1
  desktop_updater:
    path: third_party/desktop_updater

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  generate: true # Added for localization

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/changelog/desktop_releases.json
    - assets/fonts/Geist-VariableFont_wght.ttf
    - assets/fonts/Geist-Italic-VariableFont_wght.ttf
    - assets/svgs/
    - assets/svgs/hamburger/
    - assets/pngs/
    - assets/play/achievements/
    - assets/sfx/
    - assets/cursor/
    # Bundled Stockfish 17.1 binaries — engine "just works" out of the box.
    # The desktop driver (lib/desktop/services/engine/uci_engine.dart) copies
    # the right one to the app-support dir at first launch, chmod +x on macOS.
    # Mobile builds also include these in the asset manifest but never read
    # them (mobile uses package:stockfish on its own runtime branch).
    - assets/engine/macos/stockfish
    - assets/engine/windows/stockfish.exe
    # NOTE: assets/engine/linux/stockfish is intentionally NOT listed here.
    # pubspec assets are shared across platforms, so listing the 78 MB Linux
    # engine would bundle it into the macOS/Windows apps too. The Linux build
    # script (scripts/codemagic_build_linux_release.sh) injects this line at
    # build time so only the Linux bundle carries it.
    - assets/launch.webp
    - assets/app_icon.png
    # Keep local secrets out of desktop release bundles.
    # - .env
    - shorebird.yaml

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Geist
      fonts:
        # Single variable font file carries the full weight axis (100–900).
        # Flutter picks the closest available weight per TextStyle.fontWeight,
        # so chip / mainline / bracket weights all resolve from one ~165 KB
        # asset instead of bundling a static file per weight.
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
        - asset: assets/fonts/Geist-Italic-VariableFont_wght.ttf
          style: italic

patrol:
  android:
    package_name: com.chessEver.app
  ios:
    bundle_id: com.chessever.app
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

#setting up splash screen settings
flutter_native_splash:
  color: "#0C0C0E"
  image: assets/launch.webp
  color_dark: "#0C0C0E"
  image_dark: assets/launch.webp

  # Platform settings
  android: true
  ios: true
  web: false

  # Fullscreen settings
  fullscreen: false

  # Additional settings for better fullscreen experience
  android_gravity: fill
  ios_content_mode: aspectFill

  # Android 12+ specific settings (required for proper splash on modern Android)
  android_12:
    color: "#0C0C0E"
    color_dark: "#0C0C0E"
    # Use the app logo as the centered icon (Android 12 forces centered icon)
    # Icon should be 1152x1152 pixels, will be shown in a circle
    image: assets/pngs/new_app_logo.webp
    image_dark: assets/pngs/new_app_logo.webp
    # Dark background for the icon circle
    icon_background_color: "#0C0C0E"
    icon_background_color_dark: "#0C0C0E"

icons_launcher:
  image_path: "assets/pngs/new_app_logo.png"
  platforms:
    android:
      enable: true
      adaptive_background_color: '#0C0C0E'
      adaptive_foreground_image: "assets/pngs/new_app_logo.png"
      notification_image: "assets/pngs/notification_icon.png"
    ios:
      enable: true
    # Same logo on desktop — keeps brand consistent with mobile. icons_launcher
    # does not accept webp, so this points at a PNG export of the same artwork.
    macos:
      enable: true
      image_path: "assets/pngs/new_app_logo.png"
    windows:
      enable: true
      image_path: "assets/pngs/new_app_logo.png"
